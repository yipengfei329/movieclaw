# Alembic 配置文件
#
# 说明：数据库连接 URL 不写死在这里，而是在 alembic/env.py 里从应用 Settings
# 动态读取（把 sqlite+aiosqlite 转成同步的 sqlite 驱动用于迁移）。这样迁移与
# 运行期使用同一份配置，避免两处 URL 不一致。

[alembic]
# 迁移脚本目录
script_location = alembic

# 让 alembic 能 import 到 src 下的包（movieclaw_db / movieclaw_api）
prepend_sys_path = src
# 用操作系统原生路径分隔符解析上面的路径，避免新版 alembic 的兼容告警
path_separator = os

# 迁移脚本文件名带时间戳前缀，便于按时间排序阅读
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s | %(levelname)s | %(name)s | %(message)s
datefmt = %Y-%m-%d %H:%M:%S
