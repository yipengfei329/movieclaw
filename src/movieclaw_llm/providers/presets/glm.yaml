# 智谱 GLM 官方开放平台（open.bigmodel.cn，OpenAI 兼容端点）。
# 模型数据以官方文档为准（docs.bigmodel.cn，抓取于 2026-07-13）。
# 5 系默认开思考；官方渠道以 thinking.type 控制思考、无预算参数，
# max_thinking_tokens 留空。
id: glm
display_name: 智谱 GLM 官方
protocol: openai_chat
base_url: https://open.bigmodel.cn/api/paas/v4
compat:
  thinking_field: reasoning_content
  supports_stream_usage: true
models:
  # 旗舰：1M 上下文，Coding 开源 SOTA
  - id: glm-5.2
    context_window: 1000000
    max_output_tokens: 131072
    supports_tools: true
    supports_thinking: true
    modalities: [text]
  - id: glm-5.1
    context_window: 204800
    max_output_tokens: 131072
    supports_tools: true
    supports_thinking: true
    modalities: [text]
  - id: glm-5
    context_window: 204800
    max_output_tokens: 131072
    supports_tools: true
    supports_thinking: true
    modalities: [text]
  - id: glm-4.7
    context_window: 204800
    max_output_tokens: 131072
    supports_tools: true
    supports_thinking: true
    modalities: [text]
  # 免费档：30B-A3B MoE，200K 上下文，输出上限官方未公布
  - id: glm-4.7-flash
    context_window: 204800
    supports_tools: true
    supports_thinking: true
    modalities: [text]
