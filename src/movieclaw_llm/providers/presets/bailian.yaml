# 阿里云百炼（DashScope）OpenAI 兼容模式。
# 目录只维护当前主力模型（Qwen3.7 / Qwen3.6 / DeepSeek-V4 系列），数据
# 以官方文档为准（help.aliyun.com/zh/model-studio/models，抓取于
# 2026-07-12）。max_thinking_tokens 为 null 的思考模型，官方仅在控制台
# 模型卡片公布预算上限，公开文档未给出——用户可用 extra_models 覆盖补全。
#
# 思考类模型的推理内容在 reasoning_content 字段返回；Qwen3.7/3.6 与
# DeepSeek-V4 系列默认开启思考，可用 extra_body.enable_thinking=false 关闭。
id: bailian
display_name: 阿里云百炼
protocol: openai_chat
base_url: https://dashscope.aliyuncs.com/compatible-mode/v1
compat:
  thinking_field: reasoning_content
  supports_stream_usage: true
models:
  # 文本旗舰：全参数密集架构，极致推理与长文本
  - id: qwen3.7-max
    context_window: 1000000
    max_output_tokens: 65536
    supports_tools: true
    supports_parallel_tool_calls: true
    supports_thinking: true
    max_thinking_tokens: 262144
    modalities: [text]
  # 多模态全能：MoE 架构，支持图像/视频输入与 GUI 交互 agent
  - id: qwen3.7-plus
    context_window: 1000000
    max_output_tokens: 32768
    supports_tools: true
    supports_parallel_tool_calls: true
    supports_thinking: true
    max_thinking_tokens: 262144
    modalities: [text, image, video]
  # 轻量快速：3B 激活参数 MoE，百炼卡片 1024K 上下文（原生 262K 扩展而来）。
  # 输出与输入共享窗口、无独立上限，max_output_tokens 留空。
  # 思考预算按同代 qwen3.6-plus 的控制台值（81920）推断，以控制台为准。
  - id: qwen3.6-flash
    context_window: 1048576
    supports_tools: true
    supports_parallel_tool_calls: true
    supports_thinking: true
    max_thinking_tokens: 81920
    modalities: [text, image, video]
  # DeepSeek 第三方：1M 上下文 / 384K 最大输出（官方口径）。
  # 官方未提供思考预算参数信息，max_thinking_tokens 留空。
  - id: deepseek-v4-pro
    context_window: 1048576
    max_output_tokens: 384000
    supports_tools: true
    supports_thinking: true
    modalities: [text]
  - id: deepseek-v4-flash
    context_window: 1048576
    max_output_tokens: 384000
    supports_tools: true
    supports_thinking: true
    modalities: [text]
  # Kimi 第三方（月之暗面）：混合思考，原生多模态。输出与输入共享 256K 窗口，
  # 无独立输出上限故 max_output_tokens 留空。k2.5 思考预算来自百炼控制台，
  # k2.6 未单独公布、按同系值推断。编程专用的 kimi-k2.7-code 系未收录。
  - id: kimi-k2.5
    context_window: 262144
    supports_tools: true
    supports_thinking: true
    max_thinking_tokens: 81920
    modalities: [text, image, video]
  - id: kimi-k2.6
    context_window: 262144
    supports_tools: true
    supports_thinking: true
    max_thinking_tokens: 81920
    modalities: [text, image, video]
  # GLM 第三方（智谱）：5 系默认开思考，全系 200K/128K（5.2 升到 1M 上下文）。
  # 思考预算 glm-5 / glm-4.7 为百炼控制台值（32768），5.1/5.2 未单独公布、
  # 按同系值推断，以控制台为准。
  - id: glm-5.2
    context_window: 1000000
    max_output_tokens: 131072
    supports_tools: true
    supports_thinking: true
    max_thinking_tokens: 32768
    modalities: [text]
  - id: glm-5.1
    context_window: 204800
    max_output_tokens: 131072
    supports_tools: true
    supports_thinking: true
    max_thinking_tokens: 32768
    modalities: [text]
  - id: glm-5
    context_window: 204800
    max_output_tokens: 131072
    supports_tools: true
    supports_thinking: true
    max_thinking_tokens: 32768
    modalities: [text]
  - id: glm-4.7
    context_window: 204800
    max_output_tokens: 131072
    supports_tools: true
    supports_thinking: true
    max_thinking_tokens: 32768
    modalities: [text]
