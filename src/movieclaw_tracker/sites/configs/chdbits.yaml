# 彩虹岛（CHDBits）站点配置
# 官网：https://chdbits.co/

site_id: chdbits
display_name: 彩虹岛
base_url: https://chdbits.co
framework: nexusphp

selectors:
  # ── 分页 ──────────────────────────────────────────────────────────
  # 彩虹岛（标准 NexusPHP torrents.php）分页从 0 开始：?page=0 才是第一页。
  # 应用层页码从 1 起算，故发送时需减 1，否则 page=1 会取到"第二页"、漏掉首页
  # 全部结果（搜索/同步都受影响）。与 ssd 同理。
  page_offset: -1

  # ── 种子列表 ─────────────────────────────────────────────────────
  # 彩虹岛的行结构是 tr > td > table.torrentname，用 :has() 精准匹配数据行
  torrent_row_css: "table.torrents > tr:has(table.torrentname)"

  # 分类 ID 来自分类链接的 cat 参数（?cat=401），而非图片 class
  # _extract_category_id 会用正则提取其中的数字
  torrent_category_css: "a[href^='?cat=']::attr(href)"

  # 副标题放在 font.subtitle 下，直接取其文本（含 div 内的标签文本）
  torrent_subtitle_css: "font.subtitle"

  # ── 促销 ──────────────────────────────────────────────────────────
  # 彩虹岛使用标准 NexusPHP img.pro_* 类名，下载/上传系数规则沿用默认值
  # 截止时间在 td.embedded 内的 span[title] 属性中
  torrent_promo_deadline_css: "td.embedded > span[title]"
  torrent_promo_deadline_attr: "title"

  # ── 登录验证 ──────────────────────────────────────────────────────
  # 登录成功后页面中存在精确匹配 logout.php 的退出链接
  login_success_css: "a[href='logout.php']"

  # ── 用户资料 ──────────────────────────────────────────────────────
  # 彩虹岛的资料数据取自页面顶部用户栏：font.color_* 元素只装标签文字
  # （如 "上传量："），实际数值在其后紧跟的文本节点里（与 SSD 结构相同），
  # 因此统一用 ::next_sibling_text（XPath following-sibling::text()[1]）提取。
  # 实测页面片段：<font class='color_uploaded'>上传量：</font> 25.052 TB
  profile_username_css: "a[href^='userdetails.php?id=']"
  profile_uploaded_css: "font.color_uploaded::next_sibling_text"
  profile_downloaded_css: "font.color_downloaded::next_sibling_text"
  profile_ratio_css: "font.color_ratio::next_sibling_text"
  # 做种/下载计数紧跟在对应 img 图标后面的文本节点里：<img alt="Torrents seeding" ... />2
  profile_seeding_css: "img[alt='Torrents seeding']::next_sibling_text"
  profile_leeching_css: "img[alt='Torrents leeching']::next_sibling_text"
  # VIP 用户组：用户名链接的 class 以 VIP 开头
  profile_vip_css: "a[class^='VIP']"

# ── 分类映射 ──────────────────────────────────────────────────────
# 将彩虹岛的站点分类 ID 映射到应用级 TorrentCategory 枚举
categories:
  movie:       [401]
  tv:          [402, 403, 407]   # TV Series / TV Shows / Sports
  documentary: [404]
  anime:       [405]
  music:       [406, 408]        # Music Videos / HQ Audio
  other:       [409]
